name: main

permissions:
  contents: read
  packages: write

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  IMAGE_TAG: ghcr.io/arclabssoftware/demo-hris:main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository code
        uses: actions/checkout@v4
        with:
          ref: "main"

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u arclabssoftware --password-stdin

      - name: Build and push Docker image
        run: |
          docker pull $IMAGE_TAG || true
          docker build --cache-from $IMAGE_TAG -t $IMAGE_TAG .
          docker push $IMAGE_TAG

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_TUNNEL_HOST }}
          username: ${{ secrets.SSH_TUNNEL_USER }}
          key: ${{ secrets.SSH_TUNNEL_KEY }}
          script: |
            cd demo-hris
            git fetch origin main
            git reset --hard origin/main
            
            echo "Pulling new image and restarting services..."
            chmod +x deploy.sh
            ./deploy.sh

            echo "Deployment complete ✅"












